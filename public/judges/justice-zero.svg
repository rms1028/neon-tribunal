<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="jz-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jz-visor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="jz-body" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="100" cy="100" r="95" fill="url(#jz-glow)"/>
  <!-- Head - angular android shape -->
  <path d="M100 28 L140 50 L145 95 L138 130 L62 130 L55 95 L60 50 Z" fill="#151e2e" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Face plate -->
  <path d="M100 40 L132 56 L136 92 L130 120 L70 120 L64 92 L68 56 Z" fill="#0c1420" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Visor / Eyes -->
  <rect x="65" y="72" width="70" height="14" rx="3" fill="url(#jz-visor)" opacity="0.85"/>
  <rect x="65" y="72" width="70" height="14" rx="3" fill="none" stroke="#00f0ff" stroke-width="1"/>
  <!-- Eye details -->
  <circle cx="82" cy="79" r="4" fill="#0a0a1a"/>
  <circle cx="82" cy="79" r="2" fill="#00f0ff"/>
  <circle cx="118" cy="79" r="4" fill="#0a0a1a"/>
  <circle cx="118" cy="79" r="2" fill="#00f0ff"/>
  <!-- Nose line -->
  <line x1="100" y1="90" x2="100" y2="102" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Mouth slit -->
  <rect x="85" y="106" width="30" height="2" rx="1" fill="#00f0ff" opacity="0.5"/>
  <!-- Circuit lines on face -->
  <path d="M68 65 L75 60 L85 60" stroke="#00f0ff" stroke-width="0.6" stroke-opacity="0.35" fill="none"/>
  <path d="M132 65 L125 60 L115 60" stroke="#00f0ff" stroke-width="0.6" stroke-opacity="0.35" fill="none"/>
  <path d="M72 100 L65 105" stroke="#00f0ff" stroke-width="0.6" stroke-opacity="0.3" fill="none"/>
  <path d="M128 100 L135 105" stroke="#00f0ff" stroke-width="0.6" stroke-opacity="0.3" fill="none"/>
  <!-- Antenna/top detail -->
  <line x1="100" y1="28" x2="100" y2="16" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="100" cy="14" r="3" fill="#00f0ff" opacity="0.7"/>
  <!-- Neck -->
  <rect x="88" y="130" width="24" height="12" fill="#151e2e" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Shoulders / Body -->
  <path d="M60 142 L88 142 L88 175 L40 175 L45 155 Z" fill="url(#jz-body)" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.4"/>
  <path d="M140 142 L112 142 L112 175 L160 175 L155 155 Z" fill="url(#jz-body)" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="88" y="142" width="24" height="33" fill="#0c1420" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Chest circuit -->
  <circle cx="100" cy="158" r="6" fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="100" cy="158" r="2.5" fill="#00f0ff" opacity="0.6"/>
  <!-- Shoulder lights -->
  <circle cx="55" cy="155" r="2" fill="#00f0ff" opacity="0.5"/>
  <circle cx="145" cy="155" r="2" fill="#00f0ff" opacity="0.5"/>
</svg>
